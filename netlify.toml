[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirects and headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Enable image CDN transformations
[images]
  remote_images = []

# SPA-like behavior for client-side routing (optional)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
